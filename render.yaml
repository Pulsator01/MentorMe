databases:
  - name: mentorme-db
    databaseName: mentorme
    user: mentorme
    plan: free

services:
  - type: redis
    name: mentorme-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: noeviction

  - type: web
    name: mentorme-api
    runtime: node
    plan: free
    buildCommand: npm ci && npm run prisma:generate && npx prisma migrate deploy --schema backend/prisma/schema.prisma
    startCommand: npm run start:api
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 20.18.1
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mentorme-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: mentorme-redis
          property: connectionString
      - key: PERSISTENCE_BACKEND
        value: prisma
      - key: EXPOSE_DEBUG_TOKENS
        value: "false"
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: APP_BASE_URL
        sync: false
      - key: API_BASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: TRUST_PROXY
        value: "true"
      - key: AI_PROVIDER
        value: auto
      - key: AI_JUDGE_PROVIDER
        value: auto
      - key: OPENAI_API_KEY
        sync: false
      # --- Email (Resend) — set in Render dashboard ---
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_REPLY_TO
        sync: false
      # --- Google OAuth — set in Render dashboard ---
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: GOOGLE_OAUTH_REDIRECT_URI
        sync: false
      # --- Object storage (S3 or Cloudflare R2) — set in Render dashboard ---
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_FORCE_PATH_STYLE
        sync: false
      - key: S3_PUBLIC_BASE_URL
        sync: false
      - key: S3_PRESIGN_TTL_SECONDS
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: production
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0"
      # --- Calendly — paste signing key from Calendly webhook settings ---
      - key: CALENDLY_WEBHOOK_SIGNING_SECRET
        sync: false

  - type: worker
    name: mentorme-worker
    runtime: node
    plan: free
    buildCommand: npm ci && npm run prisma:generate
    startCommand: npm run start:worker
    envVars:
      - key: NODE_VERSION
        value: 20.18.1
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mentorme-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: mentorme-redis
          property: connectionString
      - key: PERSISTENCE_BACKEND
        value: prisma
      - key: BETTER_AUTH_SECRET
        fromService:
          type: web
          name: mentorme-api
          envVarKey: BETTER_AUTH_SECRET
      - key: COOKIE_SECRET
        fromService:
          type: web
          name: mentorme-api
          envVarKey: COOKIE_SECRET
      - key: APP_BASE_URL
        fromService:
          type: web
          name: mentorme-api
          envVarKey: APP_BASE_URL
      - key: AI_PROVIDER
        value: auto
      - key: AI_JUDGE_PROVIDER
        value: auto
      - key: OPENAI_API_KEY
        sync: false
      # --- Email (Resend) — set in Render dashboard ---
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_REPLY_TO
        sync: false
      # --- Object storage — worker emits links but does not need write keys.
      # Keep storage envs in sync with the API service so generated URLs are
      # signed with the same credentials.
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_FORCE_PATH_STYLE
        sync: false
      - key: S3_PUBLIC_BASE_URL
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: production
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0"

